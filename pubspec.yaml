name: mituna
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=3.0.1 <4.0.0"

dependencies:
  adaptive_dialog: ^1.8.3+1
  auto_size_text: ^3.0.0
  cached_network_image: ^3.2.3
  cloud_firestore: ^4.8.0
  confetti: ^0.7.0
  cupertino_icons: ^1.0.2
  equatable: ^2.0.5
  firebase_auth: ^4.6.2
  firebase_core: ^2.13.1
  firebase_messaging: ^14.6.2
  firebase_storage: ^11.2.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  flutter_image_compress: ^2.0.3
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.3.6
  flutter_svg: ^2.0.6
  google_mobile_ads: ^3.0.0
  google_sign_in: ^6.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.0.0
  image_picker: ^0.8.7+5
  json_annotation: ^4.8.1
  logger: ^1.4.0
  lottie: ^2.4.0
  objectbox: ^2.0.0
  objectbox_flutter_libs: ^2.0.0
  path: ^1.8.3
  path_provider: ^2.0.15
  simple_animations: ^5.0.1
  soundpool: ^2.3.0
  upgrader: ^7.1.0
  uuid: ^3.0.7
  vibration: ^1.7.7

dev_dependencies:
  build_runner: null
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^2.0.0
  flutter_native_splash: ^2.2.9
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.0
  objectbox_generator: null

dependency_overrides:
  http: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/svgs/
    - assets/icons/
    - assets/lottiefiles/
    - assets/images/
    - assets/sounds/
    - assets/data/questions.json
  fonts:
    - family: Lato
      fonts:
        - asset: fonts/Lato-Regular.ttf
        - asset: fonts/Lato-Bold.ttf
          weight: 700
        - asset: fonts/Lato-Light.ttf
          weight: 400
        - asset: fonts/Lato-Thin.ttf
          weight: 200

flutter_native_splash:
  color: "#1d87ff"
  image: "assets/images/mituna.png"
  branding: "assets/images/mituna.png"
  branding_mode: center

  android_12:
    color: "#1d87ff"
    image: "assets/images/mituna.png"
    branding: "assets/images/mituna.png"
    branding_mode: center

  fullscreen: true

flutter_icons:
  android: "mituna"
  ios: true
  image_path: "assets/images/mituna_rounded.png"
  image_path_ios: "assets/images/appstore.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#1d87ff"
  adaptive_icon_foreground: "assets/images/mituna_rounded.png"
